<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPADE - Register</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Icon_SPADE.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-darker d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='Icon_SPADE.png') }}" alt="SPADE Logo" style="height: 60px;">
                    <h3 class="fw-bold mt-3 text-info">Create Account</h3>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} py-2 text-center border-0 shadow-sm">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <div class="card card-custom p-4">
                    <form method="POST" action="/register">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Username</label>
                            <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Role</label>
                            <select name="role" class="form-select bg-dark text-light border-secondary">
                                <option value="SOC Admin">SOC Admin</option>
                                <option value="L1 Analyst">L1 Analyst</option>
                                <option value="L2 Analyst">L2 Analyst</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-info w-100 fw-bold">Register</button>
                    </form>
                    <div class="text-center mt-4">
                        <small class="text-muted">Already have an account? <a href="/login" class="text-decoration-none text-primary">Login here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
